# ==========================================
# 1. Global & Environment Settings
# ==========================================
global:
  random_seed: 42
  result_dir: "./results"
  lang: "cpp"

# ==========================================
# 2. Runtime & Dataset Parameters
# ==========================================
run_params:
  samples: 300
  dataset: "./data/alert/test.parquet"
  label_map: "./models/finetuned_model_codebert_1/label_map.json"
  use_majority_voting: false

# ==========================================
# 3. Models Configuration
# ==========================================
models:
  mlm_engine: "microsoft/codebert-base-mlm"
  llm_generator: "models/qwen2.5-1.5b-code"
  target_models:
    CodeBERT: "./models/ALERT_CodeBERT"
    # GraphCodeBERT: "./models/binary_diversevul_graphcodebert"

# ==========================================
# 4. Candidate Generation (MLM & LLM)
# ==========================================
candidate_generation:
  preserve_style: true
  naming_stats_path: "naming_stats.json"

  # PPL 自然度评估设置
  is_ppl_filter: false
  ppl_batch_size: 4
  ppl_max_ratio: 1.2
  ppl_max_abs: 50.0

  # --- 轻量级 (MLM) 专属配置 ---
  lightweight:
    top_k_mlm: 60
    top_n_keep: 50
    semantic_threshold: 0.87

  # --- 重量级 (LLM) 专属配置 ---
  heavyweight:
    top_m: 25
    semantic_threshold: 0.87

# ==========================================
# 5. Attack Optimization Algorithms
# ==========================================
attack:
  algorithm: "beam"     # greedy, beam, ga
  iterations: 25        # run_params

  irtg:
    top_k: 10
    total_quota: 50
    llm_probe_quota: 4
    max_llm_enrich_attempts: 2
    rerank_after_llm_enrich: true

  beam_search:
    beam_size: 3
    cand_chunk_size: 10
    early_stop_delta: 0.3
    beam_early_stop_strategy: "none"
    beam_early_stop_patience: 2
    beam_early_stop_min_valid_vars: 3

  genetic_algorithm:
    pop_size: 40
    stagnation_threshold: 5
    mutation_rate_min: 0.1
    mutation_rate_max: 0.5
    elite_ratio: 0.25
