global:
  random_seed: 42
  result_dir: "./results"
  # Target programming language for AST parsing ('cpp' or 'c').
  lang: "cpp"

run_params:
  samples: 300
  # Path to the input dataset in Parquet format.
  dataset: "./data/test.parquet"
  # Path to the JSON file mapping integer IDs to string labels(only used in "multi" mode).
  label_map: "./models/finetuned_model_codebert_1/label_map.json"
  # Number of classification classes.
  num_classes: 2

models:
  # HuggingFace ID or local path for the Masked Language Model (used for embeddings and lightweight generation).
  mlm_engine: "microsoft/codebert-base-mlm"
  # Local path or ID for the LLM used to generate deep semantic replacements.
  llm_generator: "Qwen/Qwen2.5-Coder-1.5B-Instruct"
  # Dictionary of target classification models to attack.
  target_models:
    CodeBERT: "./models/CodeBERT_best_f1"
    # GraphCodeBERT: "./models/binary_diversevul_graphcodebert"
    UniXcoder: "./models/UniXcoder_best_f1"

candidate_generation:
  # Whether to strictly maintain the original naming style (e.g., camelCase, snake_case).
  preserve_style: true
  # Path to the heuristic naming statistics dictionary generated by the data miner.
  naming_stats_path: "naming_stats.json"

  # --- Lightweight (MLM) specific configurations ---
  lightweight:
    # Number of raw words generated per mask by the MLM.
    top_k_mlm: 60
    # Maximum number of valid candidates to retain after filtering.
    top_n_keep: 50
    # Cosine similarity threshold for semantic consistency.
    semantic_threshold: 0.87

  # --- Heavyweight (LLM) specific configurations ---
  heavyweight:
    # Target number of candidates to generate/retain using the LLM.
    top_m: 25
    # Cosine similarity threshold for LLM-generated candidates.
    semantic_threshold: 0.87

attack:
  # The optimization algorithm to use: 'greedy', 'beam', or 'ga' (Genetic Algorithm).
  algorithm: "beam"

  scar:
    # Number of top vulnerable variables to target for substitution.
    top_k: 10
    # Maximum size of the merged candidate pool per variable.
    total_quota: 50
    # Initial number of candidates generated by LLM during the shallow probe phase.
    llm_probe_quota: 4
    # Maximum retries for deep LLM generation if candidates are insufficient.
    max_llm_enrich_attempts: 2
    # Whether to re-evaluate variable vulnerability (RNNS) after obtaining new LLM candidates.
    rerank_after_llm_enrich: true

  # Settings specific to the Beam Search optimizer.
  beam_search:
    beam_size: 3
    cand_chunk_size: 10
    early_stop_delta: 0.3
    # Strategy for early stopping ('none', 'patience','dynamic' or 'gain').
    beam_early_stop_strategy: "none"
    # Number of epochs without improvement before stopping.
    beam_early_stop_patience: 2
    # Minimum number of variables modified before early stopping can trigger.
    beam_early_stop_min_valid_vars: 3

  # Settings specific to the Genetic Algorithm optimizer.
  genetic_algorithm:
    pop_size: 40
    iterations: 25
    stagnation_threshold: 5
    mutation_rate_min: 0.1
    mutation_rate_max: 0.5
    elite_ratio: 0.25